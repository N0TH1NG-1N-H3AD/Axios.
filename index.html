<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title id="tab-title">Axios.</title>

  <link rel="icon" href="/Static/Assets/Fav-Img/BIGFAV.png" />
  <link rel="stylesheet" href="/Static/Assets/Themes/Default.css" />

  <style>
    :root {
      --bg-color: #0a0a0a; 
      --accent-color: #39ff14; 
      --input-bg: #1e1e1e; 
      --text-color: #e0e0e0;
    }

    * { box-sizing: border-box; }

    body, html {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background-color: var(--bg-color);
      color: var(--text-color);
      font-family: 'Courier New', Courier, monospace;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    #matrix {
      position: fixed;
      top: 0;
      left: 0;
      z-index: 1;
    }

    .container {
      position: relative;
      z-index: 2;
      text-align: center;
      width: 100%;
      max-width: 500px;
      padding: 0 16px;
      margin: 0 auto;
    }

    .brand {
      font-size: 2.4rem;
      font-weight: bold;
      color: var(--accent-color);
      text-shadow: 0 0 20px var(--accent-color);
      margin-bottom: 18px;
      letter-spacing: 2px;
    }

    /* Keep original structure but restyle */
    #form.search-container {
      display: flex;
      align-items: center;
      gap: 6px;
      background: var(--input-bg);
      padding: 4px 8px;
      border-radius: 999px;
      border: 1px solid var(--accent-color);
      box-shadow: 0 0 10px rgba(57, 255, 20, 0.2);
      width: 100%;
      max-width: 500px;
      margin: 0 auto;
    }

    #address {
      flex: 1;
      min-width: 0;
      background: transparent;
      border: none;
      color: white;
      font-size: 0.95rem;
      outline: none;
      padding: 6px 8px;
    }

    /* optional: you can add a button later if you want */

    .stealth-btn {
      position: fixed;
      bottom: 16px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 0.7rem;
      color: var(--accent-color);
      opacity: 0.6;
      cursor: pointer;
      z-index: 2;
    }

    @media (max-width: 480px) {
      .brand {
        font-size: 2rem;
        margin-bottom: 14px;
      }

      #form.search-container {
        max-width: 90%;
        padding: 4px 6px;
      }
    }
  </style>
</head>
<body>
  <canvas id="matrix"></canvas>

  <div class="container">
    <div class="brand">Axios. (Beta) v0.3</div>

    <!-- EXACT structure Celestial-Static expects -->
    <form id="form" class="search-container">
      <input
        id="search-engine"
        value="https://www.google.com/search?q=%s"
        type="hidden"
      />
      <input
        id="address"
        type="text"
        placeholder="Search anything"
      />
    </form>
  </div>

  <div class="stealth-btn" onclick="toggleStealth()">[ STEALTH MODE ]</div>

  <script>
    const canvas = document.getElementById('matrix');
    const ctx = canvas.getContext('2d');

    function resizeCanvas() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }

    resizeCanvas();

    const characters = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789$+-*/=%\"'#&_(),.;:?!\\|{}<>[]^~";
    const fontSize = 16;
    let columns = canvas.width / fontSize;
    let drops = Array(Math.floor(columns)).fill(1);

    function drawMatrix() {
      ctx.fillStyle = "rgba(0, 0, 0, 0.05)";
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      ctx.fillStyle = "#39ff14";
      ctx.font = fontSize + "px monospace";

      for (let i = 0; i < drops.length; i++) {
        const text = characters.charAt(Math.floor(Math.random() * characters.length));
        ctx.fillText(text, i * fontSize, drops[i] * fontSize);

        if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) {
          drops[i] = 0;
        }
        drops[i]++;
      }
    }

    setInterval(drawMatrix, 50);

    window.addEventListener('resize', () => {
      resizeCanvas();
      columns = canvas.width / fontSize;
      drops = Array(Math.floor(columns)).fill(1);
    });

    function toggleStealth() {
      const title = document.getElementById('tab-title');
      title.innerText = title.innerText.includes('Axios')
        ? 'System Update - Windows'
        : 'Axios.';
    }
  </script>

  <!-- Original Celestial-Static scripts, same order/paths -->
  <script src="/Static/Scripts/func.js"></script>
  <script src="/Static/Scripts/cloak.js"></script>
  <script src="/Static/Scripts/themes.js"></script>
  <script src="/proto/protohandler.js"></script>
  <script src="/uv/uv.bundle.js" defer></script>
  <script src="/uv/uv.config.js" defer></script>
  <script src="/register-sw.js" defer></script>
  <script src="/index.js" defer></script>
  <script src="/search.js" defer></script>
</body>
</html>
